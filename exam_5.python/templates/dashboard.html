<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감정 분석 대시보드</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 8px 12px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>감정 분석 대시보드</h1>
        <!-- <p><strong>광고 클릭 수:</strong> {{ ad_click_count }}</p> -->
        <table>
            <thead>
                <tr>
                    <th>감정</th>
                    <th>시간대</th>
                    <th>시간</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in emotion_data %}
                <tr>
                    <td>{{ entry.sentiment }}</td>
                    <td>{{ entry.time_of_day }}</td>
                    <td>{{ entry.time }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div class="click-stats">
            <h2>광고 클릭 통계</h2>
            <table>
                <thead>
                    <tr>
                        <th>광고 위치</th>
                        <th>클릭 수</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>왼쪽 광고</td>
                        <td>{{ ad_clicks['left'] }}</td>
                    </tr>
                    <tr>
                        <td>중앙 광고</td>
                        <td>{{ ad_clicks['center'] }}</td>
                    </tr>
                    <tr>
                        <td>오른쪽 광고</td>
                        <td>{{ ad_clicks['right'] }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
